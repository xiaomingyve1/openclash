# 全局配置
port: 7890
socks-port: 5898
mixed-port: 5899
redir-port: 7893
tproxy-port: 7894
unified-delay: true
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning
ipv6: true
udp: true
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
authentication:
  - zzgogo:Aa1992353
# 跳过认证的IP段
skip-auth-prefixes:
  - 127.0.0.1/8 
  - ::1/128 
  - 192.168.50.0/24

# 高级网络配置
tcp-concurrent: true # 启用TCP并发
enable-process: false # 启用进程匹配
find-process-mode: 'off' # 进程匹配模式：always/strict/off
# global-client-fingerprint: chrome # 全局客户端指纹

# 数据库更新 
geox-url:
geoip: "https://github.com/Loyalsoldier/geoip/releases/latest/download/geoip-only-cn-private.dat"
geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
mmdb: "https://testingcf.jsdelivr.net/gh/Hackl0us/GeoIP2-CN@release/Country.mmdb"
asn: "https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb"
geodata-mode: true  # geoip 使用文件,dat或者mmdb,可选 true为dat / false为mmdb
geodata-loader: standard  # standard:标准加载器 / memconservative:小内存优化
geo-auto-update: true # 自动更新
geo-update-interval: 23 # 小时
# smart LightGBM模型更新
lgbm-auto-update: true #开启自动更新
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin" #LightGBM模型地址
lgbm-update-interval: 72 #更新周期/小时为单位
# 节点面板更新
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: 123456



sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain: ['rule-set:cn_domain,private_domain', 'Mijia Cloud', '+.push.apple.com', '+.wechat.com', '+.qpic.cn', '+.qq.com', '+.wechatapp.com', '+.vivox.com', '+.oray.com', '+.sunlogin.net'] # 忽略嗅探

tun:
  enable: true
  stack: mixed
  auto-detect-interface: true
  dns-hijack: ["any:53", "tcp://any:53"] 

dns:
  enable: true
  cache-algorithm: arc
  ipv6: true
  respect-rules: false
  direct-nameserver-follow-policy: true
  prefer-h3: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  direct-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  default-nameserver: ['https://223.6.6.6/dns-query', 'https://1.12.12.12/dns-query']
  nameserver: ['https://dns.google/dns-query', 'https://doh.opendns.com/dns-query']
  proxy-server-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  nameserver-policy:
    rule-set:cn_domain: [https://doh.pub/dns-query,https://dns.alidns.com/dns-query]
    rule-set:private_domain: [https://doh.pub/dns-query,https://dns.alidns.com/dns-query]
  fake-ip-filter: ['rule-set:cn_domain,private_domain,Wogg', '*.lan', '*.local', '*.home.arpa', '+.gitv.tv', '+.docker.io', '+.miwifi.com', '+.safebrowsing.apple', 'Mijia Cloud', 'time.*.com', 'time.*.gov', 'time.*.edu.cn', 'time.*.apple.com', 'time-ios.apple.com', 'time1.*.com', 'time2.*.com', 'time3.*.com', 'time4.*.com', 'time5.*.com', 'time6.*.com', 'time7.*.com', 'ntp.*.com', 'ntp1.*.com', 'ntp2.*.com', 'ntp3.*.com', 'ntp4.*.com', 'ntp5.*.com', 'ntp6.*.com', 'ntp7.*.com', '*.time.edu.cn', '*.ntp.org.cn', '+.pool.ntp.org', 'time1.cloud.tencent.com', '+.pub.3gppnetwork.org', '+.speedtest.net','+.fast.com','+.ooklaserver.net']
